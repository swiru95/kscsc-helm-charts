# step-certificates Helm chart values
# Chart: smallstep/step-certificates
# Docs: https://artifacthub.io/packages/helm/smallstep/step-certificates
#
# This configuration uses the "inject" method to provide your own
# intermediate CA certificate and key. You must supply:
#   - Your root CA certificate (PEM)
#   - Your intermediate CA certificate (PEM)
#   - Your intermediate CA private key (encrypted PEM)
#   - The CA key password (base64 encoded)
#   - A provisioner password (base64 encoded)

# -- Deployment type (StatefulSet or Deployment)
kind: StatefulSet

replicaCount: 1

# -- Container image
image:
  repository: cr.smallstep.com/smallstep/step-ca
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

# -- Disable the automatic bootstrap; we inject our own config
bootstrap:
  enabled: false
  configmaps: false
  secrets: false

# =============================================================================
# inject: Provide CA configuration, certificates and secrets directly
# =============================================================================
inject:
  enabled: true

  config:
    files:
      # -- ca.json: step-ca server configuration
      ca.json:
        root: /home/step/certs/root_ca.crt
        federateRoots: []
        crt: /home/step/certs/intermediate_ca.crt
        key: /home/step/secrets/intermediate_ca_key
        address: 0.0.0.0:9000
        dnsNames:
          - ca.kscsc.local
          - step-ca-step-certificates.step-ca.svc.cluster.local
          - 127.0.0.1
        logger:
          format: json
        db:
          type: badger
          dataSource: /home/step/db
        authority:
          claims:
            minTLSCertDuration: 5m
            maxTLSCertDuration: 2160h        # 90 days
            defaultTLSCertDuration: 720h      # 30 days
            disableRenewal: false
          provisioners:
            # -- ACME provisioner for automated certificate requests (like Let's Encrypt)
            - type: ACME
              name: acme
              forceCN: true
              claims:
                maxTLSCertDuration: 2160h     # 90 days
                defaultTLSCertDuration: 720h  # 30 days
            # -- JWK provisioner for admin/manual operations
            - type: JWK
              name: admin
              # The JWK key will be auto-generated from the provisioner password
              encryptedKey: "REPLACE_WITH_ENCRYPTED_JWK_KEY"
              key:
                use: sig
                kty: EC
                kid: "REPLACE_WITH_KID"
                crv: P-384
                alg: ES384
                # x, y values will be populated when you generate the provisioner key
                x: "REPLACE_WITH_X"
                y: "REPLACE_WITH_Y"
        tls:
          cipherSuites:
            - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
            - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
            - TLS_AES_128_GCM_SHA256
          minVersion: 1.2
          maxVersion: 1.3
          renegotiation: false

      # -- defaults.json: step CLI default configuration
      defaults.json:
        ca-url: https://ca.kscsc.local
        ca-config: /home/step/config/ca.json
        fingerprint: "REPLACE_WITH_ROOT_CA_FINGERPRINT"
        root: /home/step/certs/root_ca.crt

    # -- Certificate templates
    templates:
      x509_leaf.tpl: |
        {
          "subject": {{ toJson .Subject }},
          "sans": {{ toJson .SANs }},
        {{- if typeIs "*rsa.PublicKey" .Insecure.CR.PublicKey }}
          "keyUsage": ["keyEncipherment", "digitalSignature"],
        {{- else }}
          "keyUsage": ["digitalSignature"],
        {{- end }}
          "extKeyUsage": ["serverAuth", "clientAuth"]
        }
      ssh.tpl: |
        {
          "type": {{ toJson .Type }},
          "keyId": {{ toJson .KeyID }},
          "principals": {{ toJson .Principals }},
          "extensions": {{ toJson .Extensions }},
          "criticalOptions": {{ toJson .CriticalOptions }}
        }

  # ---------------------------------------------------------------------------
  # Certificates (PEM format) -- paste your actual certs here
  # ---------------------------------------------------------------------------
  certificates:
    # -- Your intermediate CA certificate (PEM)
    intermediate_ca: |
      -----BEGIN CERTIFICATE-----
      REPLACE_WITH_YOUR_INTERMEDIATE_CA_CERTIFICATE
      -----END CERTIFICATE-----

    # -- Your root CA certificate (PEM)
    root_ca: |
      -----BEGIN CERTIFICATE-----
      REPLACE_WITH_YOUR_ROOT_CA_CERTIFICATE
      -----END CERTIFICATE-----

  # ---------------------------------------------------------------------------
  # Secrets -- keys and passwords
  # ---------------------------------------------------------------------------
  secrets:
    # -- CA password: used to decrypt the intermediate CA key
    # Must be base64 encoded: echo -n "your-password" | base64
    ca_password: "REPLACE_WITH_BASE64_ENCODED_CA_PASSWORD"

    # -- Provisioner password: used to encrypt JWK provisioner key
    # Must be base64 encoded: echo -n "your-password" | base64
    provisioner_password: "REPLACE_WITH_BASE64_ENCODED_PROVISIONER_PASSWORD"

    x509:
      enabled: true
      # -- Your intermediate CA private key (encrypted PEM)
      intermediate_ca_key: |
        -----BEGIN EC PRIVATE KEY-----
        REPLACE_WITH_YOUR_ENCRYPTED_INTERMEDIATE_CA_KEY
        -----END EC PRIVATE KEY-----

      # -- Root CA key is optional; omit if you want to keep it offline (recommended)
      root_ca_key: ""

    ssh:
      enabled: false

# =============================================================================
# CA settings
# =============================================================================
ca:
  name: "KSCSC Certificate Authority"
  address: ":9000"
  dns: "ca.kscsc.local,step-ca-step-certificates.step-ca.svc.cluster.local,127.0.0.1"
  provisioner:
    name: admin
  db:
    enabled: true
    persistent: true
    storageClass: ""  # uses cluster default
    accessModes:
      - ReadWriteOnce
    size: 10Gi
  ssh:
    enabled: false

# =============================================================================
# Service
# =============================================================================
service:
  type: ClusterIP
  port: 443
  targetPort: 9000
  annotations: {}

# =============================================================================
# Ingress -- exposes CA to non-cluster clients
# =============================================================================
ingress:
  enabled: true
  ingressClassName: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
  hosts:
    - host: ca.kscsc.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - ca.kscsc.local
      # The CA serves its own TLS; passthrough is typically used
      # secretName: step-ca-tls  # uncomment if using ingress-terminated TLS

# =============================================================================
# Resources
# =============================================================================
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# =============================================================================
# Pod scheduling
# =============================================================================
nodeSelector: {}
tolerations: []
affinity: {}

# -- autocert sidecar (disabled by default)
autocert:
  enabled: false
