apiVersion: v1
kind: Service
metadata:
  name: {{ include "splunk.fullname" . }}-web
  labels:
    {{- include "splunk.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.web.type }}
  ports:
    - port: {{ .Values.service.web.port }}
      targetPort: {{ .Values.service.web.targetPort }}
      protocol: TCP
      name: web
  selector:
    {{- include "splunk.selectorLabels" . | nindent 4 }}
