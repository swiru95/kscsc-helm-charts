apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "splunk.fullname" . }}
  labels:
    {{- include "splunk.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "splunk.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "splunk.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "splunk.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: web
              containerPort: 8000
              protocol: TCP
            - name: hec
              containerPort: 8088
              protocol: TCP
            - name: forwarder
              containerPort: 9997
              protocol: TCP
          env:
            - name: SPLUNK_START_ARGS
              value: "--accept-license"
            - name: SPLUNK_GENERAL_TERMS
              value: "--accept-sgt-current-at-splunk-com"
            - name: SPLUNK_PASSWORD
            {{- if .Values.splunk.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.splunk.existingSecret }}
                  key: {{ .Values.splunk.existingSecretKey }}
            {{- else }}
              value: {{ .Values.splunk.password | quote }}
            {{- end }}
          volumeMounts:
            - name: splunk-data
              mountPath: /opt/splunk/var
            - name: splunk-etc
              mountPath: /opt/splunk/etc
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: splunk-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "splunk.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: splunk-etc
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
