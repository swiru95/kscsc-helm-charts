
replicaCount: 1

image:
  repository: ollama/ollama
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 11434

pvc:
  enabled: true
  # leave blank to use cluster default storageClass
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 65Gi
  # optional explicit claim name; if empty, chart will create one based on release name
  name: ""

model:
  name: mistral:7b-instruct-q4_0

commandArgs: []

resources:
  requests:
    cpu: "2"
    memory: "24Gi"
  limits:
    cpu: "4"
    memory: "32Gi"

# Set to true to request GPUs (adds `{{ "nvidia.com/gpu" }}` to limits by default).
# When enabled, the chart will also use `gpu.nodeSelector`, `gpu.tolerations` and `gpu.affinity`
# for scheduling unless you override the top-level equivalents.
gpu:
  enabled: true
  # GPU resource name (usually nvidia.com/gpu)
  resourceName: "nvidia.com/gpu"
  # How many GPUs to request
  count: 1
  # Defaults to target common NVIDIA label/taint — adjust to your cluster
  nodeSelector:
    # nvidia.com/gpu.present: "true"
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: nvidia.com/gpu.present
                operator: In
                values:
                  - "true"

# Optional: set to a runtimeClass if your cluster requires a handler for GPU runtimes
runtimeClassName: "nvidia"
# Pod-level securityContext (optional)
podSecurityContext: {}
# Container-level securityContext (optional)
containerSecurityContext: {}

oauth2ProxyBridge:
  enabled: true
  service:
    name: oauth2-proxy
    namespace: oauth2-proxy

ingress:
  enabled: true
  ingressClassName: "nginx"
  annotations: 
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.oauth2-proxy.svc.cluster.local/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://auth.kscsc.local/oauth2/start?rd=https://$host$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-Access-Token,Authorization"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "32k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/client-header-buffer-size: "16k"
    nginx.ingress.kubernetes.io/large-client-header-buffers: "4 16k"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: ollama.kscsc.local
      paths:
        - path: /
          pathType: Prefix
          backend:
            serviceName: ollama-ollama
            servicePort: 11434
  tls: []

networkPolicy:
  enabled: true
  allow:
    - name: openui
      namespace: openui
  ingress:
    enabled: true
    namespace: ingress-nginx
    podLabels:
      app.kubernetes.io/name: ingress-nginx
