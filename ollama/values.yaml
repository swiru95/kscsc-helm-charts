
replicaCount: 1

image:
  repository: ollama/ollama
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 11434

pvc:
  enabled: true
  # leave blank to use cluster default storageClass
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 65Gi
  # optional explicit claim name; if empty, chart will create one based on release name
  name: ""

model:
  name: mistral:7b-instruct-q4_0

commandArgs: []

resources:
  requests:
    cpu: "0.5"
    memory: "2Gi"
  limits:
    cpu: "2"
    memory: "8Gi"

nodeSelector: {}
tolerations: []
affinity: {}

ingress:
  enabled: true
  # ingressClassName commonly 'nginx' for nginx-ingress controller
  ingressClassName: "nginx"
  annotations: |
    kubernetes.io/ingress.class: "nginx"
  hosts:
    - host: ollama.kscsc.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
