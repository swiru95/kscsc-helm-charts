{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ollama.fullname" . }}
  labels:
    app: {{ include "ollama.name" . }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "ollama.name" . }}
  policyTypes:
    - Ingress
  ingress:
    - from:
      {{- range .Values.networkPolicy.allow }}
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: {{ .namespace }}
        podSelector:
          matchLabels:
            app: {{ .name }}
      {{- end }}
    {{- if .Values.networkPolicy.ingress.enabled }}
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingress.namespace }}
        podSelector:
          matchLabels:
{{ toYaml .Values.networkPolicy.ingress.podLabels | indent 12 }}
    {{- end }}
{{- end }}
