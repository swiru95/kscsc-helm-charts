apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ollama.fullname" . }}
  labels:
    app: {{ include "ollama.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "ollama.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "ollama.name" . }}
    spec:
      {{- if .Values.gpu.enabled }}
      {{- if .Values.gpu.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.gpu.nodeSelector | indent 8 }}
      {{- end }}
      {{- if .Values.gpu.tolerations }}
      tolerations:
{{ toYaml .Values.gpu.tolerations | indent 8 }}
      {{- end }}
      {{- if .Values.gpu.affinity }}
      affinity:
{{ toYaml .Values.gpu.affinity | indent 8 }}
      {{- end }}
      {{- else }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
      {{- end }}
      {{- end }}
      {{- if .Values.runtimeClassName }}
      runtimeClassName: {{ .Values.runtimeClassName | quote }}
      {{- end }}
      {{- if .Values.podSecurityContext }}
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      {{- end }}
      containers:
        - name: ollama
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          args:
{{ toYaml .Values.commandArgs | indent 12 }}
          {{- $res := .Values.resources | default dict }}
          {{- $limits := $res.limits | default dict }}
          {{- if .Values.gpu.enabled }}
          {{- $_ := set $limits .Values.gpu.resourceName .Values.gpu.count }}
          {{- end }}
          {{- $_ := set $res "limits" $limits }}
          resources:
{{ toYaml $res | indent 12 }}
          env:
            - name: MODEL_NAME
              value: "{{ .Values.model.name }}"
          volumeMounts:
            - name: models
              mountPath: /var/lib/ollama
      volumes:
        - name: models
{{- if .Values.pvc.enabled }}
          persistentVolumeClaim:
            claimName: {{ if .Values.pvc.name }}{{ .Values.pvc.name }}{{ else }}{{ include "ollama.fullname" . }}-models{{ end }}
{{- else }}
          emptyDir: {}
{{- end }}
