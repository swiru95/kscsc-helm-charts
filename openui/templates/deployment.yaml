apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openui.fullname" . }}
  labels:
    app: {{ include "openui.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "openui.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "openui.name" . }}
    spec:
      containers:
        - name: openui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: OLLAMA_BASE_URL
              value: "{{ .Values.ollama.baseUrl }}"

            # --- OIDC Configuration ---
{{- if .Values.oidc.enabled }}
            # 1. The Provider URL (Issuer)
            - name: OPENID_PROVIDER_URL
              value: "{{ .Values.oidc.issuer }}"

            # 2. Client ID
            - name: OAUTH_CLIENT_ID
              value: "{{ .Values.oidc.clientID }}"

            # 3. Client Secret
{{- if .Values.oidc.clientSecretSecretName }}
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.oidc.clientSecretSecretName }}"
                  key: "{{ .Values.oidc.clientSecretKey | default "client-secret" }}"
{{- else }}
            - name: OAUTH_CLIENT_SECRET
              value: "{{ .Values.oidc.clientSecret }}"
{{- end }}

            # 4. Scopes
            - name: OAUTH_SCOPES
              value: "{{ join " " .Values.oidc.scopes }}"
              
            # 5. Redirect URI
            {{- if .Values.oidc.redirectURI }}
            - name: OAUTH_REDIRECT_URI
              value: "{{ .Values.oidc.redirectURI }}"
            {{- end }}
{{- end }}

            # --- EXTRA ENV (Crucial for SSO Enforcement) ---
            # This allows you to inject ENABLE_LOGIN_FORM, WEBUI_URL, etc.
            {{- if .Values.extraEnv }}
            {{- toYaml .Values.extraEnv | nindent 12 }}
            {{- end }}

{{- if .Values.pvc.enabled }}
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
{{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
{{- if .Values.pvc.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ if .Values.pvc.name }}{{ .Values.pvc.name }}{{ else }}{{ include "openui.fullname" . }}-data{{ end }}
{{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}