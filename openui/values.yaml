replicaCount: 1

image:
  repository: ghcr.io/open-webui/open-webui
  tag: "v0.8.10"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  ingressClassName: "nginx"
  annotations: |
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: openui.kscsc.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
      - openui.kscsc.local
      secretName: openui-tls

ollama:
  baseUrl: "http://ollama-ollama.ollama.svc.cluster.local:11434"

resources: {}

nodeSelector: {}
tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
affinity: {}

oidc:
  enabled: true
  issuer: ""
  clientID: ""
  clientSecret: ""
  redirectURI: "https://openui.kscsc.local/oauth/oidc/callback"
  scopes:
    - openid
    - profile
    - email

extraEnv:
  - name: WEBUI_URL
    value: "https://openui.kscsc.local"
  - name: ENABLE_LOGIN_FORM
    value: "false"
  - name: ENABLE_SIGNUP
    value: "false"
  - name: ENABLE_OAUTH_SIGNUP
    value: "true"
  - name: OAUTH_ROLES_CLAIM
    value: "roles"
  - name: OAUTH_ADMIN_ROLES
    value: "Admin"

# Persistent volume claim for OpenUI data (optional)
# Enable to persist DB, secrets and uploads. Default size: 5Gi
pvc:
  enabled: true
  # leave blank to use cluster default storageClass
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  # optional explicit claim name; if empty, chart will create one based on release name
  name: ""