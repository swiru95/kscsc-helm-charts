config:
  clientID: ""
  clientSecret: ""
  cookieSecret: ""  
  redirect_url: "https://auth.kscsc.local/oauth2/callback"
  configFile: |
    provider="entra-id"
    oidc_issuer_url=""
    scope="openid email profile"
    allowed_groups=[""]
    email_domains=["kscsc.online"]    
    cookie_domains=[".kscsc.local"]
    whitelist_domains=["*.kscsc.local"]
    cookie_expire="2h"
  upstreams:
    - "static://200"
ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"    
    nginx.ingress.kubernetes.io/client-header-buffer-size: "16k"
    nginx.ingress.kubernetes.io/large-client-header-buffers: "4 16k"
  path: /
  hosts:
    - auth.kscsc.local
  tls: []
  proxy_prefix: "/oauth2"
  cookieSecure: false 
  extraArgs:
    log-level: "debug"
tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"